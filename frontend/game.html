<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrawDash — Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }
 
    .game-layout {
      display: grid;
      grid-template-columns: 220px 1fr 320px;
      height: calc(100vh - 57px);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
 
    /* ── leaderboard ── */
    .leaderboard {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }
 
    .panel-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
 
    .player-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0;
    }
 
    .player-list::-webkit-scrollbar { width: 4px; }
    .player-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
 
    .player-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1.25rem;
      transition: background 0.15s;
    }
 
    .player-row:hover { background: var(--surface2); }
 
    .player-rank {
      font-size: 0.7rem;
      color: var(--muted);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
 
    .player-row.rank-1 .player-rank { color: #f5c842; }
    .player-row.rank-2 .player-rank { color: #aaaaaa; }
    .player-row.rank-3 .player-rank { color: #cd7f32; }
 
    .player-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--accent);
      flex-shrink: 0;
      text-transform: uppercase;
    }
 
    .player-info {
      flex: 1;
      min-width: 0;
    }
 
    .player-name {
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    .player-name.is-you::after {
      content: ' (you)';
      color: var(--muted);
      font-size: 0.65rem;
    }
 
    .player-score {
      font-size: 0.72rem;
      color: var(--accent);
      flex-shrink: 0;
    }
 
    /* ── canvas ── */
    .canvas-area {
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      gap: 0.75rem;
    }
 
    canvas {
      background-color: white;
      border-radius: 12px;
    }

    .canvas-placeholder .icon { font-size: 2.5rem; opacity: 0.3; }
 
    /* ── chat sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }
 
    .sidebar-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .color-controls {
      display: flex;
      flex-direction: row;
      gap: 0.5rem;
    }

    .color-palette {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 2px solid white;
      cursor: pointer;
    }

    .white{
      background-color: white;
    }
    .black{
      background-color: black;
    }
    .red {
      background-color: red;
    }
    .green {
      background-color: green;
    }
    .blue{
      background-color: blue;
    }
    .yellow {
      background-color: yellow;
    }
    .brown {
      background-color: brown;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html"><div class="logo">Draw<span>Dash</span></div></a>
    <div class="room-badge">room &nbsp;<strong id="header-room-code">—</strong></div>
    <div class="user-pill" id="header-username">—</div>
  </header>

  <div class="game-layout">
     <!-- leaderboard -->
    <aside class="leaderboard">
      <div class="panel-header">&#127942; players</div>
      <div class="player-list" id="player-list">
        <!-- populated by JS -->
      </div>
    </aside>

    <div class="canvas-area">
      <div class="icon">&#9999;&#65039;</div>
      <canvas id="canvas" height="450" width="450"></canvas>
      <div class="color-controls">
        <span class="color-palette white" data-color="white"></span>
        <span class="color-palette black" data-color="black"></span>
        <span class="color-palette red" data-color="red"></span>
        <span class="color-palette green" data-color="green"></span>
        <span class="color-palette blue" data-color="blue"></span>
        <span class="color-palette yellow" data-color="yellow"></span>
        <span class="color-palette brown" data-color="brown"></span>
      </div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="dot"></div>
        live chat
      </div>

      <div id="chat-box"></div>

      <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="your guess..." autocomplete="off" />
        <button class="send-btn" id="send-btn">send</button>
      </div>
    </aside>
  </div>

  <script src="app.js"></script>
  <script>
    handleWebsocket();
    document.getElementById("send-btn").addEventListener("click", sendMessage);
  </script>
</body>
</html>
