<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrawDash — Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }
 
    .game-layout {
      display: grid;
      grid-template-columns: 220px 1fr 320px;
      height: calc(100vh - 57px);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
 
    /* ── leaderboard ── */
    .leaderboard {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }
 
    .panel-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
 
    .player-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0;
    }
 
    .player-list::-webkit-scrollbar { width: 4px; }
    .player-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
 
    .player-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.55rem 1.25rem;
      transition: background 0.15s;
    }
 
    .player-row:hover { background: var(--surface2); }
 
    .player-rank {
      font-size: 0.7rem;
      color: var(--muted);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
    }
 
    .player-row.rank-1 .player-rank { color: #f5c842; }
    .player-row.rank-2 .player-rank { color: #aaaaaa; }
    .player-row.rank-3 .player-rank { color: #cd7f32; }
 
    .player-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--accent);
      flex-shrink: 0;
      text-transform: uppercase;
    }
 
    .player-info {
      flex: 1;
      min-width: 0;
    }
 
    .player-name {
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    .player-name.is-you::after {
      content: ' (you)';
      color: var(--muted);
      font-size: 0.65rem;
    }
 
    .player-score {
      font-size: 0.72rem;
      color: var(--accent);
      flex-shrink: 0;
    }
 
    
    /* ── canvas ── */

    .hidden { display: none !important; }
    .canvas-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #5656565e;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      gap: 0.75rem;
    }

    .canvas-placeholder {
      width: 100%;
      max-width: 680px;
      aspect-ratio: 4/3;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }
 
    #canvas {
      background-color: white;
      border-radius: 4px;
    }

    .canvas-placeholder .icon { font-size: 2.5rem; opacity: 0.3; }
 
    /* ── chat sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }
 
    .sidebar-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .controls {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      width: 450px;
    }

    .color-controls {
      display: grid;
      grid-template-columns: repeat(5, 30px);
      gap: 0.3rem;
    }
    
    .pen-type, .stroke-radius {
      display: flex;
      flex-direction: row;
      gap: 0.3rem;
    }

    .color-palette {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      border: 2px solid var(--accent-dim);
    }

    .white{
      background-color: white;
    }
    .black{
      background-color: black;
    }
    .red {
      background-color: red;
    }
    .green {
      background-color: green;
    }
    .blue{
      background-color: blue;
    }
    .yellow {
      background-color: yellow;
    }
    .brown {
      background-color: brown;
    }
    .purple {
      background-color: purple;
    }
    .pink {
      background-color: pink;
    }
    .orange {
      background-color: orange;
    }

    .pencil, .eraser {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: white;
    }

    .thin, .medium, .thick {
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .thin span {
      display: block;
      width: 2px;
      height: 2px;
      background-color: black;
      border-radius: 50%;
    }

    .medium span {
      display: block;
      width: 6px;
      height: 6px;
      background-color: black;
      border-radius: 50%;
    }

    .thick span {
      display: block;
      width: 10px;
      height: 10px;
      background-color: black;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html"><div class="logo">Draw<span>Dash</span></div></a>
    <div class="room-badge">room &nbsp;<strong id="header-room-code">—</strong></div>
    <div class="user-pill" id="header-username">—</div>
  </header>

  <div class="game-layout">
     <!-- leaderboard -->
    <aside class="leaderboard">
      <div class="panel-header">&#127942; players</div>
      <div class="player-list" id="player-list">
        <!-- populated by JS -->
      </div>
    </aside>

    <div class="canvas-area" id="canvas-placeholder">
      <div class="canvas-placeholder">
        <div class="icon">&#9999;&#65039;</div>
        <span>canvas coming soon</span>
        <span id="waiting-message">waiting for host to start the game...</span>
        <button class="btn-primary" id="start-game-btn">start game</button>
      </div>
    </div>
    
    <div class="canvas-area hidden" id="canvas-area">
      <div class="icon">&#9999;&#65039;</div>
      <div style="position: relative;">
          <canvas id="canvas" height="450" width="450"></canvas>
          <canvas id="cursor-canvas" ... style="position: absolute; top: 0; left: 0; pointer-events: none;" height="450" width="450"></canvas>
      </div>
      <div class="controls" id="controls">
        <div class="color-controls">
          <span class="color-palette white" data-color="white" id="white"></span>
          <span class="color-palette black active" data-color="black" id="black"></span>
          <span class="color-palette red" data-color="red" id="red"></span>
          <span class="color-palette green" data-color="green" id="green"></span>
          <span class="color-palette blue" data-color="blue" id="blue"></span>
          <span class="color-palette yellow" data-color="yellow" id="yellow"></span>
          <span class="color-palette brown" data-color="brown" id="brown"></span>
          <span class="color-palette purple" data-color="purple" id="purple"></span>
          <span class="color-palette pink" data-color="pink" id="pink"></span>
          <span class="color-palette orange" data-color="orange" id="orange"></span>
        </div>
        <div class="pen-type">
          <span class="color-palette pencil active" data-pen="pencil" id="pencil"><img height="20" src="assets/pencil.png" alt="Pencil"></span>
          <span class="color-palette eraser" data-pen="eraser" id="eraser"><img height="20" src="assets/eraser.png" alt="Eraser"></span>
        </div>
        <div class="stroke-radius">
          <span class="color-palette thin" data-stroke="1" id="thin"><span></span></span>
          <span class="color-palette medium active" data-stroke="4" id="medium"><span></span></span>
          <span class="color-palette thick" data-stroke="8" id="thick"><span></span></span>

        </div>
      </div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="dot"></div>
        live chat
      </div>

      <div id="chat-box"></div>

      <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="your guess..." autocomplete="off" />
        <button class="send-btn" id="send-btn">send</button>
      </div>
    </aside>
  </div>

  <script src="app.js"></script>
  <script>
    if (HOST) {
      document.getElementById("waiting-message").style.display = "none";
      document.getElementById("start-game-btn").style.display = "block";
    } else {
      document.getElementById("waiting-message").style.display = "block";
      document.getElementById("start-game-btn").style.display = "none";
    }
    handleWebsocket();
    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("start-game-btn").addEventListener("click", startGame);

  </script>
</body>
</html>
